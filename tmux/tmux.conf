# --- PREFIX SETTINGS ---
# Change prefix to Ctrl+a (Easier to reach on Mac)
unbind C-b
set -g prefix C-a
bind C-a send-prefix

# --- TAHOE OPTIMIZATIONS ---
# Fix terminal colors for Tahoe's new rendering
set -g default-terminal "screen-256color"

# Increase history limit (Tahoe machines usually have the RAM for it)
set -g history-limit 50000

# Start window/pane numbering at 1 (instead of 0, matching keyboard layout)
set -g base-index 1
setw -g pane-base-index 1

# --- QUALITY OF LIFE ---
# Faster escape time (Makes Vim/Neovim snappier)
set -s escape-time 0

# Visual notification of activity in other windows
setw -g monitor-activity on

# Reload config easily
bind r source-file ~/.tmux.conf \; display "Config Reloaded!"
