# --- TAHOE OPTIMIZATIONS ---
# Fix terminal colors for Tahoe's new rendering
set -g default-terminal "screen-256color"

# Increase history limit (Tahoe machines usually have the RAM for it)
set -g history-limit 50000

# -- Status Bar Customization --
set -g renumber-windows on

# Overall status bar colors
set -g status-style 'bg=colour235,fg=white'

# Active window: stands out with a bright background
set -g window-status-current-style 'fg=colour235,bg=colour39,bold'
set -g window-status-current-format ' #I:#W '

# Inactive: subtle
set -g window-status-style 'fg=colour245,bg=colour235'
set -g window-status-format ' #I:#W '

# --- QUALITY OF LIFE ---
# Faster escape time (Makes Vim/Neovim snappier)
set -s escape-time 0

# Visual notification of activity in other windows
setw -g monitor-activity on

# Reload config easily
bind r source-file ~/.tmux.conf \; display "Config Reloaded!"
